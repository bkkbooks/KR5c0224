body:
  text: 胎息抱一歌㓜真先生服内元氣訣胎息抱一歌并序夫人受生之本莫非元氣若知元氣所居方不逺於大道老君云萬物皆抱一而生未有一物不負隂而抱陽者也若不知於抱一與道難親故道生於一也一者氣母氣結成胎胎結成息二玄各有其㫖故經云在母腹之時有胎而無息假母呼吸成長其身分靈之後胎息具焉學道之士切須知胎息二理窮其微妙若逹本原超凡證聖常人閉息不固其胎聖人存胎不固其息閉者胷滿氣亂也煙蘿子云咽復閉徒自亂尹先生云但使神常御氣鼻不失息黄庭經云琴心三曡舞胎仙自古聖人則閉固胎息而成道神氣胎結其息乃定罕聞閉息而成真也聖人云抱一守中子自沖守三歸一神氣精是也斯言實露胎息之深㫖故作抱一歌二十首以訣其要抱一須知真一源神明終自有丹田出入往來心地啓氣神相應化胎仙抱一初傅未識真功勤日久自通神杳㝠之内無相應蚌含秋月暈結珍抱一修真有異門希夷直遣到崑崙妙息不干玄牝記時中一氣鎭長存抱一須知自在寬勿今氣壅在喉間若能暁達真詮義五内三宫自得安抱一還兀達本生何勞棄内外邊行但能固蒂深根了只於此處是長生抱一真元本異常勿令神氣兩分張坐行之處長相守運到天門生自長抱一令歸五運中炁形相應豈成空空門無物何須去虚棄浮生枉用功抱一由如鏡裏人色中唯現色中身從兹漸得超三界妄麈塵更豈能塵抱一靈臺月夜開息息之中胎在胎神炁若凝歸作寳元靈欲散却還來抱一之術述正元勿將喘息擬相干真胎不過離宫上直須令住下丹田抱一元和寳易昌莫教神炁兩乖張擬將吐納爲真蒂難致身於不死郷抱一時中不暫停六字功成五臟清若留形身常住世來來生處更交生抱一惟存神氣精守三歸一自功成此身所爲憑何住金室芝田鍊至晶抱一非干守靜山居𨞬無道亦徒然長齊絕粒閑居世結得神胎始是仙抱一自餐甘露漿風雷雲雨遍疆場五藴肅然明靜後齊驅凡質泛仙郷抱一真元飬道真不勞雲水訪仙君返往元來無間得鼓顋終久損其身抱一常令舍太和鳥窠爭敢起妖訛七魄三尸寧有害崑崙山下月明多抱一身居不死郷金蓮花發坐清涼實腹虛心無滓穢玉池滿注八瓊漿抱一真詮有袐關髙才儒士豈談宣返神復熱胎元主妙㫖方知深又玄抱一求生不是難炁形相應入三田言中顯事何凝惑親沐眀師口授傅胎息抱一歌終
